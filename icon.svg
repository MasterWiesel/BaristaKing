<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%"   stop-color="#13101e"/>
      <stop offset="100%" stop-color="#07060a"/>
    </linearGradient>
    <linearGradient id="cupGold" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#f2d870"/>
      <stop offset="38%"  stop-color="#c8a848"/>
      <stop offset="100%" stop-color="#785a20"/>
    </linearGradient>
    <linearGradient id="rimGold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#d8b848"/>
      <stop offset="45%"  stop-color="#faeea0"/>
      <stop offset="100%" stop-color="#b88828"/>
    </linearGradient>
    <linearGradient id="handleGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#dfc050"/>
      <stop offset="100%" stop-color="#7a5c20"/>
    </linearGradient>
    <linearGradient id="saucerGold" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#e8cc60"/>
      <stop offset="100%" stop-color="#806028"/>
    </linearGradient>
    <linearGradient id="steamFade" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#c8a848" stop-opacity="0.75"/>
      <stop offset="60%"  stop-color="#c8a848" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#c8a848" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="coffeeRG" cx="0.37" cy="0.37" r="0.72">
      <stop offset="0%"   stop-color="#2c1507"/>
      <stop offset="100%" stop-color="#0c0603"/>
    </radialGradient>
    <!-- Soft glow behind cup -->
    <radialGradient id="glowRG" cx="0.5" cy="0.65" r="0.55">
      <stop offset="0%"   stop-color="#c8a848" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#c8a848" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="44" fill="url(#bg)"/>

  <!-- Warm glow behind the cup -->
  <rect width="192" height="192" rx="44" fill="url(#glowRG)"/>

  <!-- ── Steam (3 organic wisps) ── -->
  <path d="M74,80 C70,69 79,58 73,46 C67,34 75,25 71,17"
        stroke="url(#steamFade)" stroke-width="3.8" fill="none" stroke-linecap="round"/>
  <path d="M96,76 C91,63 100,51 95,38 C90,25 98,17 94,10"
        stroke="url(#steamFade)" stroke-width="3.8" fill="none" stroke-linecap="round"/>
  <path d="M118,80 C114,69 123,58 117,46 C111,34 119,25 115,17"
        stroke="url(#steamFade)" stroke-width="3.8" fill="none" stroke-linecap="round"/>

  <!-- ── Saucer ── -->
  <ellipse cx="96" cy="158" rx="60" ry="12" fill="url(#saucerGold)"/>
  <ellipse cx="96" cy="155" rx="56" ry="8"  fill="url(#cupGold)"/>
  <!-- Saucer top shine -->
  <ellipse cx="88" cy="153" rx="28" ry="4"  fill="rgba(255,235,150,0.18)"/>

  <!-- ── Cup body ── -->
  <path d="M50,90 L60,150 Q61,156 68,156 L124,156 Q131,156 132,150 L142,90 Z"
        fill="url(#cupGold)"/>
  <!-- Left-edge highlight -->
  <path d="M50,90 L57,128 L64,90 Z" fill="rgba(255,240,160,0.13)"/>
  <!-- Right-edge shadow -->
  <path d="M128,90 L132,150 Q131,156 124,156 L132,156 Q131,156 142,150 L142,90 Z"
        fill="rgba(0,0,0,0.16)"/>

  <!-- ── Cup rim (top ellipse) ── -->
  <ellipse cx="96" cy="90" rx="46" ry="9" fill="url(#rimGold)"/>
  <!-- Rim inner shadow -->
  <ellipse cx="96" cy="91" rx="40" ry="6" fill="rgba(0,0,0,0.25)"/>

  <!-- ── Coffee surface ── -->
  <ellipse cx="96" cy="90" rx="40" ry="7" fill="url(#coffeeRG)"/>
  <!-- Coffee sheen (angled) -->
  <ellipse cx="82" cy="88" rx="14" ry="3.5" fill="rgba(210,170,60,0.22)"
           transform="rotate(-15 82 88)"/>
  <ellipse cx="110" cy="92" rx="5"  ry="2"  fill="rgba(210,170,60,0.10)"/>

  <!-- ── Handle ── -->
  <!-- Outer gold stroke -->
  <path d="M138,108 Q168,108 168,126 Q168,146 138,146"
        stroke="url(#handleGold)" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Inner cutout (dark) -->
  <path d="M138,108 Q163,108 163,126 Q163,146 138,146"
        stroke="#08070c" stroke-width="5" fill="none" stroke-linecap="round"/>
</svg>
